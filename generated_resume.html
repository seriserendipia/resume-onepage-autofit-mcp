<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>Paged.js 最简动态字体单页预览</title>
  <!-- 引入 Paged.js CDN -->
  <style>
    .pagedjs_page {
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    /* 横向分页布局，让所有页面横排，后续页面在右边 */
    .pagedjs_pages {
      display: flex;
      flex-direction: row;
      gap: 24px;
      overflow-x: auto;
      overflow-y: hidden;
      width: 100vw;
      height: 100vh;
    }
    .pagedjs_page {
      flex: 0 0 auto;
    }
    body {
      margin: calc(var(--global-margin, 1) * var(--body-font-size, 16pt)); /* 全局外边距与正文字体大小绑定 */
      padding: calc(var(--global-padding, 1) * var(--body-font-size, 16pt)); /* 全局内边距与正文字体大小绑定 */
      font-family: sans-serif;
      font-size: 16pt;
      line-height: 1.4;
      border: none; /* 移除边框 */
      box-sizing: border-box; /* 确保边框不会影响内容大小 */
    }
    #controls {
      position: fixed;
      bottom: 10px; /* 将滑杆区域放置页面底部 */
      right: 10px; /* 将滑杆区域放置页面右侧 */
      background: #fff;
      z-index: 1000;
      padding: 8px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px #ccc;
      font-size: 14px; /* 固定滑杆区域字体大小 */
    }
    #content {
      margin: 60px 40px 40px 40px;
      font-size: var(--body-font-size, 16pt); /* 使用 CSS 变量控制内容字体大小 */
      line-height: var(--line-height, 1.4); /* 使用 CSS 变量控制内容行间距 */
    }
    h1, h2, h3, h4, h5, h6 {
      font-size: calc(var(--body-font-size, 16pt) * var(--heading-scale, 1.5)); /* 确保标题比例动态调整 */
      margin-top: calc(var(--title-hr-margin, 1) * var(--body-font-size, 16pt)); /* 动态调整标题和分割线的上间距 */
      margin-bottom: calc(var(--title-hr-margin, 1) * var(--body-font-size, 16pt)); /* 动态调整标题和分割线的下间距 */
    }
    hr {
      margin: calc(var(--title-hr-margin, 1) * var(--body-font-size, 16pt)) 0; /* 动态调整分割线的上下间距 */
    }
    /* 正文段落间距 */
    p {
      margin-top: calc(var(--body-margin, 0.05) * var(--body-font-size, 16pt));
      margin-bottom: calc(var(--body-margin, 0.05) * var(--body-font-size, 16pt));
    }
    /* 列表间距 */
    ul, ol {
      margin-top: calc(var(--ul-margin, 0.05) * var(--body-font-size, 16pt));
      margin-bottom: calc(var(--ul-margin, 0.05) * var(--body-font-size, 16pt));
    }
    li {
      margin-top: calc(var(--body-margin, 0.05) * var(--body-font-size, 16pt));
      margin-bottom: calc(var(--body-margin, 0.05) * var(--body-font-size, 16pt));
    }
    /* 强段落间距 */
    p > strong {
      display: block;
      margin-top: calc(var(--strong-paragraph-margin, 0.05) * var(--body-font-size, 16pt));
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    /* 保证 Paged.js 生成的每页都是白色背景 */
    .pagedjs_page {
      background: #fff !important;
    }
    p.description {
      margin-top: 20px;
      font-size: 14px;
      color: #555;
    }
    @page {
      margin: 0;
    }
    @page :left {
      @top-left-corner { content: none; width: 0; height: 0; }
      @top-left { content: none; width: 0; height: 0; }
      @top-center { content: none; width: 0; height: 0; }
      @top-right { content: none; width: 0; height: 0; }
      @top-right-corner { content: none; width: 0; height: 0; }
      @bottom-left-corner { content: none; width: 0; height: 0; }
      @bottom-left { content: none; width: 0; height: 0; }
      @bottom-center { content: none; width: 0; height: 0; }
      @bottom-right { content: none; width: 0; height: 0; }
      @bottom-right-corner { content: none; width: 0; height: 0; }
      @left-top { content: none; width: 0; height: 0; }
      @left-middle { content: none; width: 0; height: 0; }
      @left-bottom { content: none; width: 0; height: 0; }
      @right-top { content: none; width: 0; height: 0; }
      @right-middle { content: none; width: 0; height: 0; }
      @right-bottom { content: none; width: 0; height: 0; }
    }
  </style>
</head>
<body>
  <div id="controls">
  </div>
  <div id="content">
    <p>正在加载简历内容...</p>
  </div>
  <!-- 引入 marked.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const content = document.getElementById('content');
    console.log('初始化完成');

    // 加载 Markdown 文件并渲染
    fetch('myexperience.md')
      .then(response => {
        console.log('加载 myexperience.md');
        if (!response.ok) throw new Error('无法加载 myexperience.md');
        return response.text();
      })
      .then(md => {
        content.innerHTML = marked.parse(md);
        console.log('innerHTML___________________________________________:', content.innerHTML);
        console.log('简历内容加载完成');
      })
      .catch(err => {
        content.innerHTML = '<p style="color:red">加载简历失败：' + err.message + '</p>';
      });

    // 设置默认值函数
    function setDefaultValues() {
      const defaultFontSize = 16;
      const defaultHeadingScale = 1.5;
      const defaultLineHeight = 1.4;
      const defaultMargin = 40;
      const defaultGlobalMargin = 16;
      const defaultGlobalPadding = 16;
      const defaultTitleHrMargin = 100;
      const defaultBodyMargin = 100;
      const defaultUlMargin = 100;
      const defaultStrongParagraphMargin = 100;

      // 存储到 localStorage
      localStorage.setItem('defaultFontSize', defaultFontSize);
      localStorage.setItem('defaultHeadingScale', defaultHeadingScale);
      localStorage.setItem('defaultLineHeight', defaultLineHeight);
      localStorage.setItem('defaultMargin', defaultMargin);
      localStorage.setItem('defaultGlobalMargin', defaultGlobalMargin);
      localStorage.setItem('defaultGlobalPadding', defaultGlobalPadding);
      localStorage.setItem('defaultTitleHrMargin', defaultTitleHrMargin);
      localStorage.setItem('defaultBodyMargin', defaultBodyMargin);
      localStorage.setItem('defaultUlMargin', defaultUlMargin);
      localStorage.setItem('defaultStrongParagraphMargin', defaultStrongParagraphMargin);

      alert('默认值已设置！');
    }

    // 添加点击事件
    document.getElementById('setDefaultButton').addEventListener('click', setDefaultValues);

    window.addEventListener('DOMContentLoaded', function () {
      // 设置字体大小默认值并触发更新
      const defaultFontSize = localStorage.getItem('defaultFontSize') || 16;
      document.documentElement.style.setProperty('--body-font-size', defaultFontSize + 'pt');

      // 设置标题比例默认值并触发更新
      const defaultHeadingScale = localStorage.getItem('defaultHeadingScale') || 1.5;
      document.documentElement.style.setProperty('--heading-scale', defaultHeadingScale);

      // 设置行间距默认值并触发更新
      const defaultLineHeight = localStorage.getItem('defaultLineHeight') || 1.4;
      document.documentElement.style.setProperty('--line-height', defaultLineHeight);

      // 设置页边距默认值并触发更新
      const defaultMargin = localStorage.getItem('defaultMargin') || 20; // 修改默认值为 20
      document.getElementById('content').style.margin = defaultMargin + 'px';
      document.documentElement.style.setProperty('--page-margin', defaultMargin + 'px');

      // 设置全局外边距默认值并触发更新
      const defaultGlobalMargin = localStorage.getItem('defaultGlobalMargin') || 16;
      document.documentElement.style.setProperty('--global-margin', defaultGlobalMargin / 100); // 转换为 0-2 倍

      // 设置全局内边距默认值并触发更新
      const defaultGlobalPadding = localStorage.getItem('defaultGlobalPadding') || 16;
      document.documentElement.style.setProperty('--global-padding', defaultGlobalPadding / 100); // 转换为 0-2 倍

      // 设置标题与分割线间距默认值并触发更新
      const defaultTitleHrMargin = localStorage.getItem('defaultTitleHrMargin') || 100;
      document.documentElement.style.setProperty('--title-hr-margin', defaultTitleHrMargin / 100); // 转换为 0-2 倍

      // 设置正文间距默认值并触发更新
      const defaultBodyMargin = localStorage.getItem('defaultBodyMargin') || 5;
      document.documentElement.style.setProperty('--body-margin', defaultBodyMargin / 100); // 转换为 0-2 倍

      // 设置无序列表间距默认值并触发更新
      const defaultUlMargin = localStorage.getItem('defaultUlMargin') || 5;
      document.documentElement.style.setProperty('--ul-margin', defaultUlMargin / 100); // 转换为 0-2 倍

      // 设置连续加粗段落间距默认值并触发更新
      const defaultStrongParagraphMargin = localStorage.getItem('defaultStrongParagraphMargin') || 5;
      document.documentElement.style.setProperty('--strong-paragraph-margin', defaultStrongParagraphMargin / 100); // 转换为 0-2 倍
    });


  </script>
  <script src="https://unpkg.com/pagedjs/dist/paged.polyfill.js"></script>

  <script>
    // 自动缩放所有分页内容，始终完整展示在窗口内
    function fitPagedPagesToWindow() {
      const pages = document.querySelectorAll('.pagedjs_page');
      if (!pages.length) {
        console.log('[fitPagedPagesToWindow] 没有找到 .pagedjs_page 元素');
        return;
      }
      const pageRect = pages[0].getBoundingClientRect();
      const containerHeight = window.innerHeight;
      const containerWidth = window.innerWidth;
      // 计算缩放比例（以高度为主，保证所有页同样缩放）
      const scaleY = containerHeight / pageRect.height;
      const scaleX = containerWidth / pageRect.width;
      const scale = Math.min(scaleX, scaleY);

      console.log('[fitPagedPagesToWindow] 当前页面尺寸:', pageRect.width, 'x', pageRect.height);
      console.log('[fitPagedPagesToWindow] 窗口尺寸:', containerWidth, 'x', containerHeight);
      console.log('[fitPagedPagesToWindow] 计算缩放比例 scaleX:', scaleX, 'scaleY:', scaleY, '最终 scale:', scale);

      pages.forEach((page, idx) => {
        page.style.transform = `scale(${scale})`;
        page.style.transformOrigin = 'top left';
        console.log(`[fitPagedPagesToWindow] 第${idx+1}页应用 transform: scale(${scale})`);
      });

      // 设置父容器高度，避免溢出
      const pagesContainer = document.querySelector('.pagedjs_pages');
      if (pagesContainer) {
        pagesContainer.style.height = (pageRect.height * scale) + 'px';
        console.log('[fitPagedPagesToWindow] .pagedjs_pages 容器高度设置为:', (pageRect.height * scale) + 'px');
      } else {
        console.log('[fitPagedPagesToWindow] 没有找到 .pagedjs_pages 容器');
      }
      // 输出所有分页元素的 transform 属性
      pages.forEach((page, idx) => {
        console.log(`[fitPagedPagesToWindow] 第${idx+1}页当前 transform:`, page.style.transform);
      });
    }
    window.addEventListener('resize', fitPagedPagesToWindow);
    window.addEventListener('load', () => {
  // ...不再在 load 事件里调用 fitPagedPagesToWindow...
    });
    document.addEventListener('pagedjs:rendered', () => {
      setTimeout(fitPagedPagesToWindow, 100);
    });
  </script>

  <script>
    // 初始化 Paged.js
    window.addEventListener('load', () => {
        if (window.PagedPolyfill) {
            console.log('初始化 Paged.js');
            try {
                window.PagedPolyfill.preview();
            } catch (error) {
                console.error('调用 PagedPolyfill.preview() 时出错:', error);
            }
        } else {
            console.error('Paged.js 未加载');
        }
    });

    // 更新样式并重新加载 Paged.js
    function updateStylesAndReload() {
    console.log('更新样式并重新加载 Paged.js');
    try {
      document.documentElement.style.setProperty('--example-variable', 'value');
      window.PagedPolyfill.preview();
    } catch (error) {
      console.error('调用 PagedPolyfill.preview() 时出错:', error);
    }
    }

    // 示例：监听内容加载完成后重新渲染
    /*
    fetch('content.md')
    .then(response => response.text())
    .then(content => {
      document.getElementById('content').innerHTML = content;
      console.log('内容加载完成，重新渲染 Paged.js');
      try {
        window.PagedPolyfill.preview();
      } catch (error) {
        console.error('调用 PagedPolyfill.preview() 时出错:', error);
      }
    });
    */

    // 可选：监听 DOM 变化并重新渲染
    const observer = new MutationObserver(() => {
    console.log('检测到 DOM 变化，重新渲染 Paged.js');
    try {
      window.PagedPolyfill.preview();
    } catch (error) {
      console.error('调用 PagedPolyfill.preview() 时出错:', error);
    }
    });
    observer.observe(document.getElementById('content'), { childList: true, subtree: true });

    // 监听来自外层的消息
    window.addEventListener('message', function (event) {
      const data = event.data;
      if (data && data.type === 'updateCSS') {
        const { variable, value } = data;
        document.documentElement.style.setProperty(variable, value);

        // 调用 Paged.js 重新渲染
        if (window.PagedPolyfill) {
          try {
            window.PagedPolyfill.preview();
          } catch (error) {
            console.error('调用 PagedPolyfill.preview() 时出错:', error);
          }
        }
      }

      if (data && data.type === 'print') {
        // 调用打印功能
        window.print();

        // 打印完成后显示提示信息
        window.onafterprint = function () {
          alert('打印完成！请检查保存的 PDF 文件。');
        };
      }
    });
  </script>
</body>
</html>
