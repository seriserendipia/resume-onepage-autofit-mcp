<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>Paged.js 最简动态字体单页预览</title>
  <!-- 引入 Paged.js CDN -->
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      font-size: 16pt;
      line-height: 1.4;
    }
    #controls {
      position: fixed;
      top: 10px;
      left: 10px;
      background: #fff;
      z-index: 1000;
      padding: 8px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px #ccc;
    }
    #content {
      margin: 60px 40px 40px 40px;
    }
  </style>
</head>
<body>
  <div id="controls">
    <label>正文字体: <input type="range" id="fontSlider" min="10" max="32" value="16"> <span id="fontValue">16</span>pt</label>
    <span id="pageInfo" style="margin-left:20px;">页数: 1</span>
  </div>
  <div id="content">
    <p>正在加载简历内容...</p>
  </div>
  <!-- 引入 marked.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const fontSlider = document.getElementById('fontSlider');
    const fontValue = document.getElementById('fontValue');
    const pageInfo = document.getElementById('pageInfo');
    const content = document.getElementById('content');
    console.log('初始化完成');

    // 加载 Markdown 文件并渲染
    fetch('/myexperience.md')
      .then(response => {
        console.log('加载 myexperience.md');
        if (!response.ok) throw new Error('无法加载 myexperience.md');
        return response.text();
      })
      .then(md => {
        content.innerHTML = marked.parse(md);
        console.log('innerHTML___________________________________________:', content.innerHTML);
        // console.log('marked.parse(md):', marked.parse(md));
        // 初始化字体和分页
        // updateFontSize(fontSlider.value);
        console.log('简历内容加载完成');
      })
      .catch(err => {
        content.innerHTML = '<p style="color:red">加载简历失败：' + err.message + '</p>';
      });

    // function updateFontSize(size) {
    //   content.style.fontSize = size + 'pt';
    //   fontValue.textContent = size;
    //   // 重新分页
    //   window.PagedPolyfill.preview().then((flow) => {
    //     const pages = flow.total;
    //     pageInfo.textContent = '页数: ' + pages;
    //     // 如果页数大于1且字体大于最小值，则自动递减字体
    //     if (pages > 1 && size > 10) {
    //       updateFontSize(size - 1);
    //     }
    //   });
    // }

    // fontSlider.addEventListener('input', function() {
    //   updateFontSize(parseInt(this.value));
    // });
  </script>
  <script src="https://unpkg.com/pagedjs/dist/paged.polyfill.js"></script>
  window.PagedPolyfill.preview();

</body>
</html>
