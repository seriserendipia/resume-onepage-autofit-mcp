<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>Paged.js 最简动态字体单页预览</title>
  <!-- 防止favicon 404错误 -->
  <link rel="icon" href="data:,">
  <!-- 引入 Paged.js CDN -->
  <style>
    .pagedjs_page {
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    /* 横向分页布局，让所有页面横排，后续页面在右边 */
    .pagedjs_pages {
      display: flex;
      flex-direction: row;
      gap: 24px;
      overflow-x: auto;
      overflow-y: hidden;
      width: 100vw;
      height: 100vh;
    }
    .pagedjs_page {
      flex: 0 0 auto;
    }
    body {
      margin: calc(var(--global-margin, 1) * var(--body-font-size, 16pt)); /* 全局外边距与正文字体大小绑定 */
      padding: calc(var(--global-padding, 1) * var(--body-font-size, 16pt)); /* 全局内边距与正文字体大小绑定 */
      font-family: sans-serif;
      font-size: 16pt;
      line-height: 1.4;
      border: none; /* 移除边框 */
      box-sizing: border-box; /* 确保边框不会影响内容大小 */
    }
    #controls {
      position: fixed;
      bottom: 10px; /* 将滑杆区域放置页面底部 */
      right: 10px; /* 将滑杆区域放置页面右侧 */
      background: #fff;
      z-index: 1000;
      padding: 8px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px #ccc;
      font-size: 14px; /* 固定滑杆区域字体大小 */
    }
    #content {
      margin: 60px 40px 40px 40px;
      font-size: var(--body-font-size, 16pt); /* 使用 CSS 变量控制内容字体大小 */
      line-height: var(--line-height, 1.4); /* 使用 CSS 变量控制内容行间距 */
      visibility: visible !important; /* 强制显示内容 */
      display: block !important; /* 确保内容块级显示 */
      opacity: 1 !important; /* 确保内容不透明 */
    }
    h1, h2, h3, h4, h5, h6 {
      font-size: calc(var(--body-font-size, 16pt) * var(--heading-scale, 1.5)); /* 确保标题比例动态调整 */
      margin-top: calc(var(--title-hr-margin, 1) * var(--body-font-size, 16pt)); /* 动态调整标题和分割线的上间距 */
      margin-bottom: calc(var(--title-hr-margin, 1) * var(--body-font-size, 16pt)); /* 动态调整标题和分割线的下间距 */
    }
    hr {
      margin: calc(var(--title-hr-margin, 1) * var(--body-font-size, 16pt)) 0; /* 动态调整分割线的上下间距 */
    }
    /* 正文段落间距 */
    p {
      margin-top: calc(var(--body-margin, 0.05) * var(--body-font-size, 16pt));
      margin-bottom: calc(var(--body-margin, 0.05) * var(--body-font-size, 16pt));
    }
    /* 列表间距 */
    ul, ol {
      margin-top: calc(var(--ul-margin, 0.05) * var(--body-font-size, 16pt));
      margin-bottom: calc(var(--ul-margin, 0.05) * var(--body-font-size, 16pt));
    }
    li {
      margin-top: calc(var(--body-margin, 0.05) * var(--body-font-size, 16pt));
      margin-bottom: calc(var(--body-margin, 0.05) * var(--body-font-size, 16pt));
    }
    /* 强段落间距 */
    p > strong {
      display: block;
      margin-top: calc(var(--strong-paragraph-margin, 0.05) * var(--body-font-size, 16pt));
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    /* 保证 Paged.js 生成的每页都是白色背景 */
    .pagedjs_page {
      background: #fff !important;
    }
    p.description {
      margin-top: 20px;
      font-size: 14px;
      color: #555;
    }
    /* 简化@page规则，避免CSS解析错误 */
    @page {
      margin: 0;
    }
  </style>
  <style id="page-margins">
    @page { size: A4; margin: 20mm; }
  </style>
</head>
<body>
  <div id="controls">
  </div>
  
  <!-- 调试面板 -->
  <div id="debug-panel" style="position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 5px; font-size: 12px; z-index: 9999; max-width: 350px;">
    <div>🔄 状态: <span id="debug-status">初始化中...</span></div>
    <div>📄 Content长度: <span id="debug-content-length">0</span></div>
    <div>⏰ 最后更新: <span id="debug-last-update">-</span></div>
    <div>🌐 DOM状态: <span id="debug-dom-state">-</span></div>
    <div>📦 依赖加载: <span id="debug-dependencies">-</span></div>
    <div>💬 消息接收: <span id="debug-messages">0</span></div>
    <div>🎨 Paged.js: <span id="debug-pagedjs">-</span></div>
    <div>⚠️ 错误信息: <span id="debug-errors">无</span></div>
  </div>
  
  <div id="content" data-content>
    <p>正在加载简历内容...</p>
  </div>
  
  

  
  
  
  <!-- 引入 marked.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- 引入模块化JS文件 - 仅iframe内容页需要的文件 -->
  <!-- 状态管理系统 -->
  <script src="js/resumeStateManager.js"></script>
  <script src="js/pagedJsMiddleware.js"></script>
  <script src="js/domUpdater.js"></script>
  <!-- 业务模块 -->
  <script src="js/config.js"></script>
  <script src="js/dataLoader.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/styleController.js"></script>
  <script src="js/resumeManager.js"></script>
  <script src="js/viewer.js"></script>

  <script>
    console.log('📦 模块化JS文件加载完毕');
    
    // 调试信息更新器
    window.debugInfo = {
      messageCount: 0,
      updateStatus: function(status) {
        const el = document.getElementById('debug-status');
        if (el) el.textContent = status;
      },
      updateContentLength: function() {
        const contentEl = document.getElementById('content');
        const pagedArea = document.querySelector('.pagedjs_area');
        const lengthEl = document.getElementById('debug-content-length');
        if (lengthEl) {
          if (pagedArea && pagedArea.innerHTML.length > 0) {
            // 如果Paged.js已处理，显示处理后的内容长度
            lengthEl.textContent = `${pagedArea.innerHTML.length} (Paged.js处理后)`;
          } else if (contentEl) {
            // 否则显示原始content长度
            lengthEl.textContent = `${contentEl.innerHTML.length} (原始)`;
          } else {
            lengthEl.textContent = '0 (无内容)';
          }
        }
      },
      updateLastUpdate: function() {
        const el = document.getElementById('debug-last-update');
        if (el) el.textContent = new Date().toLocaleTimeString();
      },
      updateDOMState: function() {
        const el = document.getElementById('debug-dom-state');
        if (el) el.textContent = document.readyState;
      },
      updateDependencies: function() {
        const el = document.getElementById('debug-dependencies');
        if (el) {
          const deps = [];
          if (typeof window.ResumeConfig !== 'undefined') deps.push('Config✅');
          if (typeof window.DataLoader !== 'undefined') deps.push('DataLoader✅');
          if (typeof window.ResumeRenderer !== 'undefined') deps.push('Renderer✅');
          if (typeof window.ResumeManager !== 'undefined') deps.push('Manager✅');
          if (typeof window.ResumeViewer !== 'undefined') deps.push('Viewer✅');
          if (typeof marked !== 'undefined') deps.push('Marked✅');
          if (typeof window.PagedPolyfill !== 'undefined') deps.push('Paged✅');
          el.textContent = deps.join(' ');
        }
      },
      incrementMessages: function() {
        this.messageCount++;
        const el = document.getElementById('debug-messages');
        if (el) el.textContent = this.messageCount;
      },
      updatePagedJS: function(status) {
        const el = document.getElementById('debug-pagedjs');
        if (el) el.textContent = status;
      },
      updateErrors: function(error) {
        const el = document.getElementById('debug-errors');
        if (el) el.textContent = error || '无';
      },
      updateAll: function() {
        this.updateDOMState();
        this.updateContentLength();
        this.updateLastUpdate();
        this.updateDependencies();
      }
    };
    
    // 定期更新调试信息
    setInterval(() => {
      window.debugInfo.updateAll();
    }, 2000);
    
    // 立即更新一次
    setTimeout(() => {
      window.debugInfo.updateAll();
      window.debugInfo.updateStatus('等待DOM加载...');
    }, 100);
  </script>
  
  <!-- 引入 Paged.js - 放在最后，确保其他脚本已加载 -->
  <script src="js/paged.polyfill.js"></script>
  
  <!-- 简化的 Paged.js 状态通知 -->
  <script>
    // 简单检查 Paged.js 是否加载并通知调试面板
    let pagedJsCheckInterval = setInterval(() => {
      if (typeof window.PagedPolyfill !== 'undefined') {
        console.log('✅ Paged.js 文件已加载');
        if (window.debugInfo) {
          window.debugInfo.updatePagedJS('文件已加载');
        }
        clearInterval(pagedJsCheckInterval);
        
        // 通知 viewer.js Paged.js 已准备好
        if (typeof window.pagedJsFileLoaded === 'function') {
          window.pagedJsFileLoaded();
        }
      }
    }, 100);
    
    // 10秒后停止检查
    setTimeout(() => {
      clearInterval(pagedJsCheckInterval);
      if (typeof window.PagedPolyfill === 'undefined') {
        console.error('❌ Paged.js 加载失败');
        if (window.debugInfo) {
          window.debugInfo.updatePagedJS('❌ 加载失败');
          window.debugInfo.updateErrors('Paged.js文件加载失败');
        }
      }
    }, 10000);
  </script>
</body>
</html>
