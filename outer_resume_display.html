<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>外层网页控制内嵌 Paged.js</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: linear-gradient(135deg,#b2ebf2 0%, #e0f7fa 40%, #fce4ec 100%);
    }
    #controls {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: #fff;
      z-index: 1000;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px #ccc;
    }
    iframe {
      width: 100%;
      height: 90vh;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    .slider-wrapper {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .limit-btn {
      width: 24px;
      height: 24px;
      padding: 0;
      font-size: 10px;
      line-height: 24px;
      text-align: center;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #f8f9fa;
      border-radius: 4px;
    }
    .limit-btn:hover {
      background: #e2e6ea;
    }
  </style>
</head>
<body>
  <div id="controls">
    <table>
      <thead>
        <tr>
          <th>功能</th>
          <th>滑杆</th>
          <th>当前值</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>正文字体大小</td>
          <td>
            <div class="slider-wrapper">
               <button class="limit-btn min-btn" title="最小值">L</button>
               <input type="range" id="fontSlider" min="9" max="13" step="0.5" value="9">
               <button class="limit-btn max-btn" title="最大值">H</button>
            </div>
          </td>
          <td><span id="fontValue">9pt</span></td>
        </tr>
        <tr>
          <td>标题比例</td>
          <td>
            <div class="slider-wrapper">
               <button class="limit-btn min-btn" title="最小值">L</button>
               <input type="range" id="headingSlider" min="1.0" max="1.7" step="0.1" value="1.7">
               <button class="limit-btn max-btn" title="最大值">H</button>
            </div>
          </td>
          <td><span id="headingValue">1.7倍</span></td>
        </tr>
        <tr>
          <td>行间距</td>
          <td>
            <div class="slider-wrapper">
               <button class="limit-btn min-btn" title="最小值">L</button>
               <input type="range" id="lineHeightSlider" min="1" max="1.7" step="0.05" value="1.45">
               <button class="limit-btn max-btn" title="最大值">H</button>
            </div>
          </td>
          <td><span id="lineHeightValue">1.45倍</span></td>
        </tr>
        <tr>
          <td>页面边距</td>
          <td>
            <div class="slider-wrapper">
               <button class="limit-btn min-btn" title="最小值">L</button>
               <input type="range" id="marginSlider" min="7" max="21" step="1" value="7">
               <button class="limit-btn max-btn" title="最大值">H</button>
            </div>
          </td>
          <td><span id="marginValue">7 mm</span></td>
        </tr>
        
        <!-- Global Margins/Padding removed as they are redundant for specific margin controls -->

        <tr>
          <td>标题/分割线间距</td>
          <td>
            <div class="slider-wrapper">
               <button class="limit-btn min-btn" title="最小值">L</button>
               <input type="range" id="titleHrMarginSlider" min="0" max="0.7" step="0.1" value="0">
               <button class="limit-btn max-btn" title="最大值">H</button>
            </div>
          </td>
          <td><span id="titleHrMarginValue">0 em</span></td>
        </tr>
        <tr>
          <td>段落间距</td>
          <td>
            <div class="slider-wrapper">
               <button class="limit-btn min-btn" title="最小值">L</button>
               <input type="range" id="bodyMarginSlider" min="0" max="0.5" step="0.1" value="0.5">
               <button class="limit-btn max-btn" title="最大值">H</button>
            </div>
          </td>
          <td><span id="bodyMarginValue">0.5 em</span></td>
        </tr>
        <tr>
          <td>列表间距</td>
          <td>
            <div class="slider-wrapper">
               <button class="limit-btn min-btn" title="最小值">L</button>
               <input type="range" id="ulMarginSlider" min="0" max="0.5" step="0.1" value="0">
               <button class="limit-btn max-btn" title="最大值">H</button>
            </div>
          </td>
          <td><span id="ulMarginValue">0 em</span></td>
        </tr>
        <tr>
          <td>强调段落间距</td>
          <td>
            <div class="slider-wrapper">
               <button class="limit-btn min-btn" title="最小值">L</button>
               <input type="range" id="strongParagraphMarginSlider" min="0" max="0.2" step="0.1" value="0.2">
               <button class="limit-btn max-btn" title="最大值">H</button>
            </div>
          </td>
          <td><span id="strongParagraphMarginValue">0.2 em</span></td>
        </tr>
      </tbody>
    </table>
    <button id="setDefaultButton">设为默认值</button>
    <!-- 添加打印按钮 -->
    <button id="printButton">导出为 PDF</button>
  </div>

  <iframe id="innerFrame" src="generated_resume.html"></iframe>

  <!-- 引入模块化JS文件 - 只用于外层控制 -->
  <!-- 状态管理系统 -->
  <script src="js/resumeStateManager.js"></script>
  <script src="js/pagedJsMiddleware.js"></script>
  <script src="js/domUpdater.js"></script>
  <!-- 原有模块 -->
  <script src="js/config.js"></script>
  <script src="js/styleController.js"></script>
  <script src="js/sliderController.js"></script>
  <script src="js/controller.js"></script>
  
  <!-- 初始化外层控制器 -->
  <script>
    // 等待DOM加载完成后初始化外层控制器
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeResumeController);
    } else {
      initializeResumeController();
    }
  </script>
</body>
</html>
